<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — PunkTrader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #0C0C0C;
  --bg-2:   #111111;
  --bg-3:   #191919;
  --border: #222220;
  --accent: #CFFF04;
  --green:  #00FF41;
  --text:   #F0ECD8;
  --text-2: #888880;
  --text-3: #444440;
  --font-d: 'Bebas Neue', sans-serif;
  --font-m: 'IBM Plex Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-m);
  font-size: 13px;
  min-height: 100vh;
}

/* ─── Top bar ───────────────────────────────── */

.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  height: 48px;
  padding: 0 24px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  position: relative;
}

.topbar::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none;
}

.brand {
  font-family: var(--font-d);
  font-size: 24px;
  letter-spacing: 3px;
  color: var(--accent);
  text-decoration: none;
  text-shadow: 0 0 12px rgba(207,255,4,0.35);
}

.back-link {
  font-family: var(--font-m);
  font-size: 12px;
  color: var(--text-2);
  text-decoration: none;
  letter-spacing: 0.5px;
  margin-left: 4px;
}

.back-link:hover { color: var(--text); }

.topbar h1 {
  font-family: var(--font-d);
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--text);
  font-weight: 400;
  margin-left: auto;
  padding-right: 2px;
}

/* ─── Layout ─────────────────────────────────── */

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 40px 24px 64px;
}

/* ─── Saved banner ───────────────────────────── */

.saved {
  background: rgba(0,255,65,0.06);
  border: 1px solid rgba(0,255,65,0.25);
  color: var(--green);
  padding: 10px 14px;
  margin-bottom: 28px;
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* ─── Section headings ───────────────────────── */

.group {
  margin-bottom: 32px;
}

.group h2 {
  font-family: var(--font-d);
  font-size: 15px;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 16px;
  line-height: 1;
}

/* ─── Divider ─────────────────────────────────── */

hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0 0 32px;
}

/* ─── Form fields ─────────────────────────────── */

label {
  display: block;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

input[type=text],
input[type=password],
select,
textarea {
  width: 100%;
  background: var(--bg-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 8px 10px;
  font-family: var(--font-m);
  font-size: 13px;
  margin-bottom: 14px;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.1s;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

textarea {
  resize: vertical;
  min-height: 64px;
}

/* ─── Submit button ───────────────────────────── */

.btn-save {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 0;
  padding: 11px 36px;
  cursor: pointer;
  font-family: var(--font-d);
  font-size: 18px;
  letter-spacing: 3px;
  transition: opacity 0.1s;
}

.btn-save:hover { opacity: 0.88; }

.note {
  color: var(--text-3);
  font-size: 11px;
  letter-spacing: 0.5px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">PUNK</a>
  <a href="/" class="back-link">← BACK</a>
  <h1>SETTINGS</h1>
</div>

<div class="container">

  {% if request.args.get('saved') %}
  <div class="saved">Settings saved. Restart PunkTrader for changes to take effect.</div>
  {% endif %}

  <form method="POST" action="/settings">

    <div class="group">
      <h2>FMP API</h2>
      <label>API Key</label>
      <input type="password" name="fmp_api_key" value="{{ env.get('FMP_API_KEY', '') }}">
    </div>

    <hr>

    <div class="group">
      <h2>General</h2>
      <label>Timezone</label>
      <select name="timezone">
        {% for tz in timezones %}
        <option value="{{ tz }}" {{ 'selected' if env.get('TIMEZONE', 'America/Los_Angeles') == tz else '' }}>{{ tz }}</option>
        {% endfor %}
      </select>
      <label>Default Ticker</label>
      <input type="text" name="default_ticker" value="{{ env.get('DEFAULT_TICKER', 'SPY') }}">
    </div>

    <hr>

    <div class="group">
      <h2>Watchlist</h2>
      <label>Tickers for key level alerts (comma-separated)</label>
      <textarea name="watchlist">{{ env.get('WATCHLIST', '') }}</textarea>
    </div>

    <div>
      <button type="submit" class="btn-save">SAVE</button>
      <p class="note">Changes take effect on next restart.</p>
    </div>

  </form>
</div>
</body>
</html>
